name: PlanarMotorsExperiment

services:
  # bt_controller:
  #   build:
  #     context: .
  #     dockerfile: BT_Controller/dockerfile
  #   container_name: bt_controller
  #   network_mode: host
  #   volumes:
  #     - ./MQTTSchemas:/src/planar-motors-experiments/MQTTSchemas
  #   depends_on:
  #     - filling_station
  #     - stoppering_station
  production_planner:
    build:
      context: ../../../
      dockerfile: Planner/deployment/production_planner.dockerfile
    container_name: production_planner
    environment:
      - MQTT_BROKER=${MQTT_BROKER:-hivemq-broker}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - PYTHONPATH=/app
    volumes:
      - ../../:/app  # Mount simulated_stations root
      - ../../../packml_runtime:/app/packml_runtime  # Mount shared PackML runtime
      - ../../../Planner:/app/Planner  # Mount planner core + PR2 bridge
      - ../../../unified-planning:/app/unified-planning  # Mount vendored UP fork
      - ../../../MQTTSchemas:/app/MQTTSchemas  # Overlay schemas
      - ../../../AASDescriptions:/app/AASDescriptions  # Mount AAS configs for registration
      - ../../../BTDescriptions:/app/BTDescriptions  # Mount BT descriptions for subtree loading
    command: ["-m", "Planner.production_planner_service"]

  filling_station:
    build:
      context: ../..
      dockerfile: deployment/docker/stations.dockerfile
    container_name: filling_station
    environment:
      - MQTT_BROKER=${MQTT_BROKER:-hivemq-broker}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - PYTHONPATH=/app
    volumes:
      - ../../:/app  # Mount simulated_stations root
      - ../../../packml_runtime:/app/packml_runtime  # Mount shared PackML runtime
      - ../../../MQTTSchemas:/app/MQTTSchemas  # Overlay schemas
      - ../../../AASDescriptions:/app/AASDescriptions  # Mount AAS configs for registration
    command: ["-m", "services.stations.filling.service"]

  stoppering_station:
    build:
      context: ../..
      dockerfile: deployment/docker/stations.dockerfile
    container_name: stoppering_station
    environment:
      - MQTT_BROKER=${MQTT_BROKER:-hivemq-broker}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - PYTHONPATH=/app
    volumes:
      - ../../:/app  # Mount simulated_stations root
      - ../../../packml_runtime:/app/packml_runtime  # Mount shared PackML runtime
      - ../../../MQTTSchemas:/app/MQTTSchemas  # Overlay schemas
      - ../../../AASDescriptions:/app/AASDescriptions  # Mount AAS configs for registration
    command: ["-m", "services.stations.stoppering.service"]

  load_station:
    build:
      context: ../..
      dockerfile: deployment/docker/stations.dockerfile
    container_name: load_station
    environment:
      - MQTT_BROKER=${MQTT_BROKER:-hivemq-broker}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - PYTHONPATH=/app
    volumes:
      - ../../:/app  # Mount simulated_stations root
      - ../../../packml_runtime:/app/packml_runtime  # Mount shared PackML runtime
      - ../../../MQTTSchemas:/app/MQTTSchemas  # Overlay schemas
      - ../../../AASDescriptions:/app/AASDescriptions  # Mount AAS configs for registration
    command: ["-m", "services.stations.loading.service"]

  unload_station:
    build:
      context: ../..
      dockerfile: deployment/docker/stations.dockerfile
    container_name: unload_station
    environment:
      - MQTT_BROKER=${MQTT_BROKER:-hivemq-broker}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - PYTHONPATH=/app
    volumes:
      - ../../:/app  # Mount simulated_stations root
      - ../../../packml_runtime:/app/packml_runtime  # Mount shared PackML runtime
      - ../../../MQTTSchemas:/app/MQTTSchemas  # Overlay schemas
      - ../../../AASDescriptions:/app/AASDescriptions  # Mount AAS configs for registration
    command: ["-m", "services.stations.unloading.service"]
    
  camera_station:
    build:
      context: ../..
      dockerfile: deployment/docker/stations.dockerfile
    container_name: camera_station
    restart: always
    environment:
      - MQTT_BROKER=${MQTT_BROKER:-hivemq-broker}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - PYTHONPATH=/app
    volumes:
      - ../../:/app  # Mount simulated_stations root
      - ../../../packml_runtime:/app/packml_runtime  # Mount shared PackML runtime
      - ../../../MQTTSchemas:/app/MQTTSchemas  # Overlay schemas
      - ../../../AASDescriptions:/app/AASDescriptions  # Mount AAS configs for registration
    devices:
      - /dev/video0:/dev/video0
    command: ["-m", "services.stations.camera.service"]