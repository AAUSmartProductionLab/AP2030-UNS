planarTableShuttle2AAS:
  idShort: planarTableShuttle2AAS
  id: 'https://smartproductionlab.aau.dk/aas/planarTableShuttle2AAS'
  globalAssetId: 'https://smartproductionlab.aau.dk/assets/OTZhZGNiZDAtNTNhNS00YmJhLThiNDctMzFjYzM3OGNiNTMw'
  derivedFrom: 'https://smartproductionlab.aau.dk/aas/templates/resource'
  assetType: 'https://smartproductionlab.aau.dk/Resource/CPS/MotionSystem/planarTableShuttle'
  serialNumber: 'PM-S1-2024-001'
  location: 'InnoLab, Nybrovej, AAU'
  AssetInterfacesDescription:
    InterfaceMQTT:
      Title: 'Planar Motors Shuttle'
      EndpointMetadata:
        base: 'mqtt://192.168.0.104:1883/NN/Nybrovej/InnoLab/Planar/Xbot2'
        contentType: 'application/json'
      InteractionMetadata:
        actions:
        - key: 'MoveToPosition'
          title: 'MoveToPosition'
          synchronous: 'true'
          input: 'https://aausmartproductionlab.github.io/AP2030-UNS/MQTTSchemas/moveToPosition.schema.json'
          output: 'https://aausmartproductionlab.github.io/AP2030-UNS/MQTTSchemas/commandResponse.schema.json'
          forms:
            contentType: 'application/json'
            href: '/CMD/XYMotion'
            op: 'invokeAction'
            mqv_retain: 'false'
            mqv_controlPacket: subscribe
            mqv_qos: '2'
            response:
              contentType: 'application/json'
              href: '/DATA/XYMotion'
              mqv_controlPacket: 'publish'
              mqv_retain: 'false'
        - key: 'Halt'
          title: 'Halt'
          synchronous: 'true'
          input: 'https://aausmartproductionlab.github.io/AP2030-UNS/MQTTSchemas/command.schema.json'
          forms:
            contentType: 'application/json'
            href: '/CMD/Halt'
            op: 'invokeAction'
            mqv_retain: 'false'
            mqv_controlPacket: subscribe
            mqv_qos: '2'
        - key: 'Occupy'
          title: 'Occupy'
          synchronous: 'true'
          input: 'https://aausmartproductionlab.github.io/AP2030-UNS/MQTTSchemas/command.schema.json'
          output: 'https://aausmartproductionlab.github.io/AP2030-UNS/MQTTSchemas/commandResponse.schema.json'
          forms:
            contentType: 'application/json'
            href: '/CMD/Occupy'
            op: 'invokeAction'
            mqv_retain: 'false'
            mqv_controlPacket: subscribe
            mqv_qos: '2'
            response:
              contentType: 'application/json'
              href: '/DATA/Occupy'
              mqv_controlPacket: 'publish'
              mqv_retain: 'false'
        - key: 'Release'
          title: 'Release'
          synchronous: 'true'
          input: 'https://aausmartproductionlab.github.io/AP2030-UNS/MQTTSchemas/command.schema.json'
          output: 'https://aausmartproductionlab.github.io/AP2030-UNS/MQTTSchemas/commandResponse.schema.json'
          forms:
            contentType: 'application/json'
            href: '/CMD/Release'
            op: 'invokeAction'
            mqv_retain: 'false'
            mqv_controlPacket: subscribe
            mqv_qos: '2'
            response:
              contentType: 'application/json'
              href: '/DATA/Release'
              mqv_controlPacket: 'publish'
              mqv_retain: 'false'
        properties:
        - key: 'StationState'
          title: 'StationState'
          output: 'https://aausmartproductionlab.github.io/AP2030-UNS/MQTTSchemas/stationState.schema.json'
          forms:
            contentType: 'application/json'
            href: '/DATA/State'
            mqv_retain: 'true'
            mqv_controlPacket: publish
            mqv_qos: '0'
        - key: 'ProductID'
          title: 'ProductID'
          input: 'https://aausmartproductionlab.github.io/AP2030-UNS/MQTTSchemas/productId.schema.json'
          forms:
            contentType: 'application/json'
            href: '/DATA/ProductId'
            mqv_retain: 'false'
            mqv_controlPacket: publish
            mqv_qos: '0'
        - key: 'Location'
          title: 'Location'
          output: 'https://aausmartproductionlab.github.io/AP2030-UNS/MQTTSchemas/positionStamped.schema.json'
          forms:
            contentType: 'application/json'
            href: '/DATA/Location'
            mqv_retain: 'true'
            mqv_controlPacket: publish
            mqv_qos: '0'

  Variables:
  - key: PackMLState
    semanticId: 'https://www.omac.org/packml/state'
    InterfaceReference:
      Name: 'StationState'
      Field: 'State'
  - key: OccupationState
    semanticId: 'cssx:StationOccupation'
    InterfaceReference:
      Name: 'StationState'
      Field: 'ProcessQueue'
  - key: Location
    semanticId: 'cssx:LocationParameter'
    InterfaceReference:
      Name: 'Location'
      Field: 'Position'

  Parameters:
    ProductID:
      semanticId: 'cssx:ProductIdentifier'
      InterfaceReference: 'ProductID'

  HierarchicalStructures:
    Name: 'BillOfMaterials'
    Archetype: 'OneUp'
    IsPartOf:
      planarTableAAS:
        globalAssetId: 'https://smartproductionlab.aau.dk/assets/ZTM1NTAzNzQtMDZkNi00N2Q4LWI1YTktMGNhMmY0MDEyNTk4'
  Capabilities:
  - key: MoveToPosition
    realizedBy: "MoveToPosition"
    semantic_id: cssx:MoveToPositionCapability


  AI-Planning:
      Domain:
          Fluents:
              -   key: "Operational"
                  semantic_id: "cssx:Operational"
                  parameters:
                      -   name: "Resource"
                          externalRef: "css:Resource"
                  transformation: 'params[0].Variables.PackMLState.State = "Execute"'

              -   key: "Occupied"
                  semantic_id: "cssx:Occupied"
                  parameters:
                      -   name: "Resource"
                          externalRef: "css:Resource"
                      -   name: "Product"
                          externalRef: "css:Product"
                  transformation: 'params[0].Variables.OccupationState.ProcessQueue[0] = params[1].Parameters.Uuid'

              -   key: "Free"
                  semantic_id: "cssx:Free"
                  parameters:
                      -   name: "Resource"
                          externalRef: "css:Resource"
                  transformation: '$count(params[0].Variables.OccupationState.ProcessQueue) = 0'

              -   key: "ResourceAt"
                  semantic_id: "cssx:ResourceAt"
                  parameters:
                      -   name: "Resource"
                          externalRef: "css:Resource"
                      -   name: "Location"
                          externalRef: "cssx:LocationParameter"
                  constants:
                      threshold: 50.0
                  transformation: '$sqrt($power(params[0].Variables.Location.Position[0] - params[1].Parameters.Location.Position.X, 2) + $power(params[0].Variables.Location.Position[1] - params[1].Parameters.Location.Position.Z, 2)) < constants.threshold'

          Actions:
              -   key: "Move"
                  semantic_id: "cssx:MoveToPositionCapability"
                  SkillReference: "MoveToPosition"
                  # JSONata: build a moveToPosition request body. Schema
                  # requires Uuid + TimeStamp + Position[X, Y]. There is no
                  # Product in this action so the runtime auto-generates
                  # Uuid (exposed in the JSONata context as `uuid`) and
                  # tracks the response by it. ``params[2]`` is the
                  # destination LocationParameter whose Position carries
                  # the planar X/Y in millimetres.
                  transformation: '{"Uuid": uuid, "TimeStamp": now, "Position": [params[2].Parameters.Position.X, params[2].Parameters.Position.Y]}'
                  parameters:
                      -   name: "TransportSystem"
                          externalRef: "cssx:Transport"
                      -   name: "From"
                          externalRef: "cssx:LocationParameter"
                      -   name: "To"
                          externalRef: "cssx:LocationParameter"
                  conditions:
                      at_start:
                          - predicate:
                              ref: "Operational"
                              parameters: [0]
                          - predicate:
                              ref: "Free"
                              parameters: [0]
                          - predicate:
                              external: "cssx:ResourceAt"
                              parameters: [0 ,1]
                  effects:
                      at_end:
                          - not:
                            - predicate:
                                external: "cssx:ResourceAt"
                                parameters: [0 ,1]
                          - predicate:
                              external: "cssx:ResourceAt"
                              parameters: [0, 2]

              -   key: "Transport"
                  semantic_id: "cssx:MoveToPositionCapability"
                  SkillReference: "MoveToPosition"
                  # JSONata: ``params[1]`` is the Product (its Uuid drives
                  # response correlation), ``params[3]`` is the
                  # destination LocationParameter (X/Y in mm).
                  transformation: '{"Uuid": params[1].Parameters.Uuid, "TimeStamp": now, "Position": [params[3].Parameters.Position.X, params[3].Parameters.Position.Y]}'
                  parameters:
                      -   name: "TransportSystem"
                          externalRef: "cssx:Transport"
                      -   name: "Product"
                          externalRef: "css:Product"

                      -   name: "From"
                          externalRef: "cssx:LocationParameter"

                      -   name: "To"
                          externalRef: "cssx:LocationParameter"
                      -   name: "DestinationStation"
                          externalRef: "css:Resource"
                          
                  conditions:
                      at_start:
                          - predicate:
                              ref: "Operational"
                              parameters: [0]

                          - predicate:
                              ref: "Occupied"
                              parameters: [0, 1]

                          - predicate:
                              external: "cssx:On"
                              parameters: [1, 0]

                          - predicate:
                              external: "cssx:ProductAt"
                              parameters: [1, 2]

                          - predicate:
                              external: "cssx:ResourceAt"
                              parameters: [0 ,2]
                          - predicate:
                              ref: "Occupied"
                              parameters: [4, 1]
                          - predicate:
                              external: "cssx:StationAt"
                              parameters: [4, 3]
                  effects:
                      at_end:
                          - not:
                            - predicate:
                                external: "cssx:ResourceAt"
                                parameters: [0 ,2]
                          - not:
                            - predicate:
                                external: "cssx:ProductAt"
                                parameters: [1 ,2]
                          - predicate:
                              external: "cssx:ResourceAt"
                              parameters: [0 ,3]

                          - predicate:
                              external: "cssx:ProductAt"
                              parameters: [1 ,3]
                                  
              -   key: "Occupy"
                  semantic_id: "cssx:OccupyCapability"
                  SkillReference: "Occupy"
                  transformation: '{"Uuid": params[1].Parameters.Uuid}'
                  parameters:
                      -   name: "TransportSystem"
                          modelRef:
                              - AAS: "self"
                      -   name: "Product"
                          externalRef: "css:Product"
                  conditions:
                      at_start:
                          - predicate:
                              ref: "Operational"
                              parameters: [0]
                          - not:
                              predicate:
                                  ref: "Occupied"
                                  parameters: [0, 1]
                  effects:
                      at_end:
                          - predicate:
                              ref: "Occupied"
                              parameters: [0, 1]
                          - not:
                              predicate:
                                  ref: "Free"
                                  parameters: [0]


              -   key: "Release"
                  semantic_id: "cssx:ReleaseCapability"
                  SkillReference: "Release"
                  transformation: '{"Uuid": params[1].Parameters.Uuid}'
                  parameters:
                      -   name: "TransportSystem"
                          modelRef:
                              - AAS: "self"
                      -   name: "Product"
                          externalRef: "css:Product"
                  conditions:
                      at_start:
                          - predicate:
                              ref: "Operational"
                              parameters: [0]
                          - predicate:
                              ref: "Occupied"
                              parameters: [0, 1]
                  effects:
                      at_end:
                          - not:
                              - predicate:
                                  ref: "Occupied"
                                  parameters: [0, 1]
                          - predicate:
                              ref: "Free"
                              parameters: [0]

      Problem:
          Objects:
              -   name: "planarShuttle2"
                  modelRef:
                      - AAS: "self"
              -   name: "initialLocation2"
                  modelRef:
                      - AAS: "self"
                        Submodel: "Variables"
                        Element: "Location"

          Init:
              -   predicate:
                  ref: "Operational"
                  parameters: [0]
              -   predicate:
                  ref: "Free"
                  parameters: [0]
              -   predicate:
                  ref: "ResourceAt"
                  parameters: [0, 1]

          Goal:
              - predicate:
                  ref: "Operational"
                  parameters: [0]
              -   predicate:
                  ref: "Free"
                  parameters: [0]

  Skills:
  - key: MoveToPosition
    description: "Move the planar shuttle to a target position"
    semantic_id: "cssx:MoveToPositionSkill"
    InterfaceReference: MoveToPosition
  - key: Halt
    description: "Halt the current operation"
    semantic_id: "cssx:HaltSkill"
    InterfaceReference: Halt
  - key: Occupy
    description: "Occupy the system for exclusive use"
    semantic_id: "cssx:OccupySkill"
    InterfaceReference: Occupy
  - key: Release
    description: "Release the system from exclusive use"
    semantic_id: "cssx:ReleaseSkill"
    InterfaceReference: Release
