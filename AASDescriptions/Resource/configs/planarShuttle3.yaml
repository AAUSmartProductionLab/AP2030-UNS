planarTableShuttle3AAS:
  idShort: planarTableShuttle3AAS
  id: 'https://smartproductionlab.aau.dk/aas/planarTableShuttle3AAS'
  globalAssetId: 'https://smartproductionlab.aau.dk/assets/YjY3ZTJjZGEtZDYxMC00ZDJjLTlkYjYtOGUyNGE4NWVlNTBi'
  derivedFrom: 'https://smartproductionlab.aau.dk/aas/templates/resource'
  assetType: 'https://smartproductionlab.aau.dk/Resource/CPS/MotionSystem/planarTableShuttle'
  serialNumber: 'PM-S1-2024-001'
  location: 'InnoLab, Nybrovej, AAU'
  AssetInterfacesDescription:
    InterfaceMQTT:
      Title: 'Planar Motors Shuttle'
      EndpointMetadata:
        base: 'mqtt://192.168.0.104:1883/NN/Nybrovej/InnoLab/Planar/Xbot3'
        contentType: 'application/json'
      InteractionMetadata:
        actions:
        - key: 'MoveToPosition'
          title: 'MoveToPosition'
          synchronous: 'true'
          input: 'https://aausmartproductionlab.github.io/AP2030-UNS/MQTTSchemas/moveToPosition.schema.json'
          output: 'https://aausmartproductionlab.github.io/AP2030-UNS/MQTTSchemas/commandResponse.schema.json'
          forms:
            contentType: 'application/json'
            href: '/CMD/XYMotion'
            op: 'invokeAction'
            mqv_retain: 'false'
            mqv_controlPacket: subscribe
            mqv_qos: '2'
            response:
              contentType: 'application/json'
              href: '/DATA/XYMotion'
              mqv_controlPacket: 'publish'
              mqv_retain: 'false'
        - key: 'Halt'
          title: 'Halt'
          synchronous: 'true'
          input: 'https://aausmartproductionlab.github.io/AP2030-UNS/MQTTSchemas/command.schema.json'
          forms:
            contentType: 'application/json'
            href: '/CMD/Halt'
            op: 'invokeAction'
            mqv_retain: 'false'
            mqv_controlPacket: subscribe
            mqv_qos: '2'
        - key: 'Occupy'
          title: 'Occupy'
          synchronous: 'true'
          input: 'https://aausmartproductionlab.github.io/AP2030-UNS/MQTTSchemas/command.schema.json'
          output: 'https://aausmartproductionlab.github.io/AP2030-UNS/MQTTSchemas/commandResponse.schema.json'
          forms:
            contentType: 'application/json'
            href: '/CMD/Occupy'
            op: 'invokeAction'
            mqv_retain: 'false'
            mqv_controlPacket: subscribe
            mqv_qos: '2'
            response:
              contentType: 'application/json'
              href: '/DATA/Occupy'
              mqv_controlPacket: 'publish'
              mqv_retain: 'false'
        - key: 'Release'
          title: 'Release'
          synchronous: 'true'
          input: 'https://aausmartproductionlab.github.io/AP2030-UNS/MQTTSchemas/command.schema.json'
          output: 'https://aausmartproductionlab.github.io/AP2030-UNS/MQTTSchemas/commandResponse.schema.json'
          forms:
            contentType: 'application/json'
            href: '/CMD/Release'
            op: 'invokeAction'
            mqv_retain: 'false'
            mqv_controlPacket: subscribe
            mqv_qos: '2'
            response:
              contentType: 'application/json'
              href: '/DATA/Release'
              mqv_controlPacket: 'publish'
              mqv_retain: 'false'
        properties:
        - key: 'StationState'
          title: 'StationState'
          output: 'https://aausmartproductionlab.github.io/AP2030-UNS/MQTTSchemas/stationState.schema.json'
          forms:
            contentType: 'application/json'
            href: '/DATA/State'
            mqv_retain: 'true'
            mqv_controlPacket: publish
            mqv_qos: '0'
        - key: 'ProductID'
          title: 'ProductID'
          input: 'https://aausmartproductionlab.github.io/AP2030-UNS/MQTTSchemas/productId.schema.json'
          forms:
            contentType: 'application/json'
            href: '/DATA/ProductId'
            mqv_retain: 'false'
            mqv_controlPacket: publish
            mqv_qos: '0'

  Variables:
  - key: PackMLState
    semanticId: 'https://www.omac.org/packml/state'
    InterfaceReference:
      Name: 'StationState'
      Field: 'State'
  - key: OccupationState
    semanticId: 'https://smartproductionlab.aau.dk/stationOccupation'
    InterfaceReference:
      Name: 'StationState'
      Field: 'ProcessQueue'
  - key: Location
    semanticId: 'https://smartproductionlab.aau.dk/Location'
    # InterfaceReference:
    #   Name: 'StationState'
    #   Field: 'State'
  Parameters:
    ProductID:
      semanticId: 'https://smartproductionlab.aau.dk/productID'
      InterfaceReference: 'ProductID'

  HierarchicalStructures:
    Name: 'BillOfMaterials'
    Archetype: 'OneUp'
    IsPartOf:
      planarTableAAS:
        globalAssetId: 'https://smartproductionlab.aau.dk/assets/ZTM1NTAzNzQtMDZkNi00N2Q4LWI1YTktMGNhMmY0MDEyNTk4'
  Capabilities:
  - key: MoveToPosition
    realizedBy: "MoveToPosition"
    semantic_id: https://smartproductionlab.aau.dk/Capability/MoveToPosition

  AI-Planning:
      Domain:
          Fluents:
              -   key: "Operational"
                  semantic_id: "https://smartproductionlab.aau.dk/PDDL/Term/Predicates/Operational"
                  parameters:
                      -   name: "Resource"
                          externalRef: "https://smartproductionlab.aau.dk/Resource"
                  transformation: 'parameter1.Variables.PackMLState.State == "Execute"'

              -   key: "Occupied"
                  semantic_id: "https://smartproductionlab.aau.dk/PDDL/Term/Predicates/Occupied"
                  parameters:
                      -   name: "Resource"
                          externalRef: "https://smartproductionlab.aau.dk/Resource"
                      -   name: "Product"
                          externalRef: "https://smartproductionlab.aau.dk/Product"
                  transformation: 'parameter1.Variables.OccupationState.ProcessQueue[0] == parameter2.Parameters.Uuid'

              -   key: "Free"
                  semantic_id: "https://smartproductionlab.aau.dk/PDDL/Term/Predicates/Free"
                  parameters:
                      -   name: "Resource"
                          externalRef: "https://smartproductionlab.aau.dk/Resource"
                  transformation: 'parameter1.Variables.OccupationState.ProcessQueue == []'

              -   key: "At"
                  semantic_id: "https://smartproductionlab.aau.dk/PDDL/Term/Predicates/At"
                  parameters:
                      -   name: "Resource"
                          externalRef: "https://smartproductionlab.aau.dk/Resource"
                      -   name: "Location"
                          externalRef: "https://smartproductionlab.aau.dk/Location"
                  transformation: 'parameter1.Variables.Location == parameter2'

          Actions:
              -   key: "MoveToPosition"
                  SkillReference: "MoveToPosition"
                  parameters:
                      -   name: "TransportSystem"
                          modelRef:
                              - AAS: "self"
                      -   name: "Product"
                          externalRef: "https://smartproductionlab.aau.dk/Product"

                      -   name: "From"
                          externalRef: "https://smartproductionlab.aau.dk/Location"

                      -   name: "To"
                          externalRef: "https://smartproductionlab.aau.dk/Location"
                          
                  conditions:
                      at_start:
                          - predicate:
                              ref: "Operational"
                              parameters: [0]

                          - predicate:
                              ref: "Occupied"
                              parameters: [0, 1]

                          - predicate:
                              external: "https://smartproductionlab.aau.dk/PDDL/Term/Predicates/On"
                              parameters: [1, 2]

                          - predicate:
                              external: "https://smartproductionlab.aau.dk/PDDL/Term/Predicates/At"
                              parameters: [1, 0]

                          - predicate:
                              external: "https://smartproductionlab.aau.dk/PDDL/Term/Predicates/At"
                              parameters: [0 ,2]
                  effects:
                      at_end:
                          - predicate:
                              external: "https://smartproductionlab.aau.dk/PDDL/Term/Predicates/At"
                              parameters: [0 ,3]

                          - predicate:
                              external: "https://smartproductionlab.aau.dk/PDDL/Term/Predicates/At"
                              parameters: [1 ,3]
                                  
              -   key: "Occupy"
                  SkillReference: "Occupy"
                  parameters:
                      -   name: "TransportSystem"
                          modelRef:
                              - AAS: "self"
                      -   name: "Product"
                          externalRef: "https://smartproductionlab.aau.dk/Product"
                  conditions:
                      at_start:
                          - predicate:
                              ref: "Operational"
                              parameters: [0]
                          - not:
                              predicate:
                                  ref: "Occupied"
                                  parameters: [0, 1]
                  effects:
                      at_end:
                          - predicate:
                              ref: "Occupied"
                              parameters: [0, 1]
                          - not:
                              predicate:
                                  ref: "Free"
                                  parameters: [0]


              -   key: "Release"
                  SkillReference: "Release"
                  parameters:
                      -   name: "TransportSystem"
                          modelRef:
                              - AAS: "self"
                      -   name: "Product"
                          externalRef: "https://smartproductionlab.aau.dk/Product"
                  conditions:
                      at_start:
                          - predicate:
                              ref: "Operational"
                              parameters: [0]
                          - predicate:
                              ref: "Occupied"
                              parameters: [0, 1]
                  effects:
                      at_end:
                          - not:
                              - predicate:
                                  ref: "Occupied"
                                  parameters: [0, 1]
                          - predicate:
                              ref: "Free"
                              parameters: [0]

      Problem:
          Objects:
              -   name: "planarShuttle3"
                  modelRef:
                      - AAS: "self"

          Init:
              -   predicate:
                  ref: "Operational"
                  parameters: [0]
              -   predicate:
                  ref: "Free"
                  parameters: [0]

          Goal:
              - predicate:
                  ref: "Operational"
                  parameters: [0]
              -   predicate:
                  ref: "Free"
                  parameters: [0]

  Skills:
  - key: MoveToPosition
    description: "Move the planar shuttle to a target position"
    semantic_id: "https://smartproductionlab.aau.dk/skills/MoveToPosition"
    InterfaceReference: MoveToPosition
  - key: Halt
    description: "Halt the current operation"
    semantic_id: "https://smartproductionlab.aau.dk/skills/Halt"
    InterfaceReference: Halt
  - key: Occupy
    description: "Occupy the system for exclusive use"
    semantic_id: "https://smartproductionlab.aau.dk/skills/Occupy"
    InterfaceReference: Occupy
  - key: Release
    description: "Release the system from exclusive use"
    semantic_id: "https://smartproductionlab.aau.dk/skills/Release"
    InterfaceReference: Release
