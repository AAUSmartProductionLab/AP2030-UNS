imaDispensingSystemAAS:
  idShort: imaDispensingSystemAAS
  id: 'https://smartproductionlab.aau.dk/aas/imaDispensingSystemAAS'
  globalAssetId: 'https://smartproductionlab.aau.dk/assets/MzFiZTU1YzAtODc0ZC00YTRmLTkzYzItMDQ5ZDZjZDdhZTYw'
  derivedFrom: 'https://smartproductionlab.aau.dk/aas/templates/resource'
  assetType: 'https://smartproductionlab.aau.dk/Resource/CPPM/DispensingSystem/imaDispensingSystem'
  serialNumber: 'IMA-DS-2024-001'
  location: 'InnoLab, Nybrovej, AAU'
  AssetInterfacesDescription:
    InterfaceMQTT:
      Title: 'IMA Dispensing System'
      EndpointMetadata:
        base: 'mqtt://192.168.0.104:1883/NN/Nybrovej/InnoLab/Dispensing'
        contentType: 'application/json'
      InteractionMetadata:
        actions:
        - key: 'Dispensing'
          title: 'Dispensing'
          synchronous: 'true'
          input: 'https://aausmartproductionlab.github.io/AP2030-UNS/MQTTSchemas/command.schema.json'
          output: 'https://aausmartproductionlab.github.io/AP2030-UNS/MQTTSchemas/commandResponse.schema.json'
          forms:
            contentType: 'application/json'
            href: '/CMD/Dispensing'
            op: 'invokeAction'
            mqv_retain: 'false'
            mqv_controlPacket: subscribe
            mqv_qos: '2'
            response:
              contentType: 'application/json'
              href: '/DATA/Dispensing'
              mqv_controlPacket: 'publish'
              mqv_retain: 'false'
        - key: 'Halt'
          title: 'Halt'
          synchronous: 'true'
          input: 'https://aausmartproductionlab.github.io/AP2030-UNS/MQTTSchemas/command.schema.json'
          forms:
            contentType: 'application/json'
            href: '/CMD/Halt'
            op: 'invokeAction'
            mqv_retain: 'false'
            mqv_controlPacket: subscribe
            mqv_qos: '2'
        - key: 'Occupy'
          title: 'Occupy'
          synchronous: 'true'
          input: 'https://aausmartproductionlab.github.io/AP2030-UNS/MQTTSchemas/command.schema.json'
          output: 'https://aausmartproductionlab.github.io/AP2030-UNS/MQTTSchemas/commandResponse.schema.json'
          forms:
            contentType: 'application/json'
            href: '/CMD/Occupy'
            op: 'invokeAction'
            mqv_retain: 'false'
            mqv_controlPacket: subscribe
            mqv_qos: '2'
            response:
              contentType: 'application/json'
              href: '/DATA/Occupy'
              mqv_controlPacket: 'publish'
              mqv_retain: 'false'
        - key: 'Release'
          title: 'Release'
          synchronous: 'true'
          input: 'https://aausmartproductionlab.github.io/AP2030-UNS/MQTTSchemas/command.schema.json'
          output: 'https://aausmartproductionlab.github.io/AP2030-UNS/MQTTSchemas/commandResponse.schema.json'
          forms:
            contentType: 'application/json'
            href: '/CMD/Release'
            op: 'invokeAction'
            mqv_retain: 'false'
            mqv_controlPacket: subscribe
            mqv_qos: '2'
            response:
              contentType: 'application/json'
              href: '/DATA/Release'
              mqv_controlPacket: 'publish'
              mqv_retain: 'false'
        properties:
        - key: 'StationState'
          title: 'StationState'
          output: 'https://aausmartproductionlab.github.io/AP2030-UNS/MQTTSchemas/stationState.schema.json'
          forms:
            contentType: 'application/json'
            href: '/DATA/State'
            mqv_retain: 'true'
            mqv_controlPacket: publish
            mqv_qos: '0'
        - key: 'Weight'
          title: 'Weight'
          output: 'https://aausmartproductionlab.github.io/AP2030-UNS/MQTTSchemas/weight.schema.json'
          forms:
            contentType: 'application/json'
            href: '/DATA/Weight'
            mqv_retain: 'true'
            mqv_controlPacket: publish
            mqv_qos: '0'

  Variables:
  - key: PackMLState
    semanticId: 'https://www.omac.org/packml/state'
    InterfaceReference:
      Name: 'StationState'
      Field: 'State'
  - key: OccupationState
    semanticId: 'cssx:StationOccupation'
    InterfaceReference:
      Name: 'StationState'
      Field: 'ProcessQueue'
  - key: Weight
    semanticId: 'cssx:WeightMeasurement'
    InterfaceReference:

      Name: 'Weight'
  Parameters:
    Location:
      semanticId: 'cssx:LocationParameter'
      Position:
        X: 240.0
        Y: 0.0
        Yaw: 0.0
  HierarchicalStructures:
    Name: 'BillOfMaterials'
    Archetype: 'OneUp'
    IsPartOf:
      aauFillingLineAAS:
        globalAssetId: 'https://smartproductionlab.aau.dk/assets/MWQ2ODY5ZDEtZTQ3Yy00NWU4LTlmYTAtNTI3YjVlMDk4MWFi'
  Capabilities:
  - key: Dispensing
    realizedBy: "Dispensing"
    semantic_id: cssx:DispensingCapability

  AI-Planning:
      Domain:
          Fluents:
              -   key: "Operational"
                  semantic_id: "cssx:Operational"
                  parameters:
                      -   name: "Resource"
                          externalRef: "css:Resource"
                  transformation: 'params[0].Variables.PackMLState.State = "Execute"'

              -   key: "Occupied"
                  semantic_id: "cssx:Occupied"
                  parameters:
                      -   name: "Resource"
                          externalRef: "css:Resource"
                      -   name: "Product"
                          externalRef: "css:Product"
                  transformation: 'params[0].Variables.OccupationState.ProcessQueue[0] = params[1].Parameters.Uuid'

              -   key: "Free"
                  semantic_id: "cssx:Free"
                  parameters:
                      -   name: "Resource"
                          externalRef: "css:Resource"
                  transformation: '$count(params[0].Variables.OccupationState.ProcessQueue) = 0'

              -   key: "StationAt"
                  semantic_id: "cssx:StationAt"
                  parameters:
                      -   name: "Resource"
                          externalRef: "css:Resource"
                      -   name: "Location"
                          externalRef: "cssx:LocationParameter"

          Actions:
              -   key: "Dispensing"
                  semantic_id: "cssx:DispensingCapability"
                  SkillReference: "Dispensing"
                  # JSONata transformation building the MQTT command body. The
                  # Product (params[1]) carries a runtime Uuid in its Parameters
                  # submodel; we promote it to the command's Uuid so request and
                  # response correlate against the same identity.
                  transformation: '{"Uuid": params[1].Parameters.Uuid}'
                  parameters:
                      -   name: "DispensingSystem"
                          modelRef:
                              - AAS: "self"
                      -   name: "Product"
                          externalRef: "css:Product"
                      -   name: "TransportSystem"
                          externalRef: "cssx:Transport"
                      -   name: "DispensingLocation"
                          modelRef:
                              - AAS: "self"
                                Submodel: "Parameters"
                                Element: "Location"
                          
                  conditions:
                      at_start:
                          - predicate:
                              ref: "Operational"
                              parameters: [0]
                          - predicate:
                              ref: "Occupied"
                              parameters: [0, 1]
                          - predicate:
                              external: "cssx:On"
                              parameters: [1, 2]
                          - predicate:
                              external: "cssx:ProductAt"
                              parameters: [1, 3]
                  effects:
                      at_end:
                          - predicate:
                              external: "cssx:Dispensed"
                              parameters: [1]
                            
              -   key: "Occupy"
                  semantic_id: "cssx:OccupyCapability"
                  SkillReference: "Occupy"
                  transformation: '{"Uuid": params[1].Parameters.Uuid}'
                  parameters:
                      -   name: "DispensingSystem"
                          modelRef:
                              - AAS: "self"
                      -   name: "Product"
                          externalRef: "css:Product"
                  conditions:
                      at_start:
                          - predicate:
                              ref: "Operational"
                              parameters: [0]
                          - not:
                              predicate:
                                  ref: "Occupied"
                                  parameters: [0, 1]
                  effects:
                      at_end:
                          - predicate:
                              ref: "Occupied"
                              parameters: [0, 1]
                          - not:
                              predicate:
                                  ref: "Free"
                                  parameters: [0]


              -   key: "Release"
                  semantic_id: "cssx:ReleaseCapability"
                  SkillReference: "Release"
                  transformation: '{"Uuid": params[1].Parameters.Uuid}'
                  parameters:
                      -   name: "DispensingSystem"
                          modelRef:
                              - AAS: "self"
                      -   name: "Product"
                          externalRef: "css:Product"
                  conditions:
                      at_start:
                          - predicate:
                              ref: "Operational"
                              parameters: [0]
                          - predicate:
                              ref: "Occupied"
                              parameters: [0, 1]
                  effects:
                      at_end:
                          - not:
                              - predicate:
                                  ref: "Occupied"
                                  parameters: [0, 1]
                          - predicate:
                              ref: "Free"
                              parameters: [0]

      Problem:
          Objects:
              -   name: "imaDispensingSystem"
                  modelRef:
                      - AAS: "self"
              -   name: "dispensingLocation"
                  modelRef:
                      - AAS: "self"
                        Submodel: "Parameters"
                        Element: "Location"

          Init:
              -   predicate:
                  ref: "Operational"
                  parameters: [0]
              -   predicate:
                  ref: "Free"
                  parameters: [0]
              -   predicate:
                  ref: "StationAt"
                  parameters: [0, 1]

          Goal:
              - predicate:
                  ref: "Operational"
                  parameters: [0]
              -   predicate:
                  ref: "Free"
                  parameters: [0]

  Skills:
  - key: Dispensing
    description: "Dispensing function for pharmaceutical primary packaging"
    semantic_id: "cssx:DispensingSkill"
    InterfaceReference: Dispensing
  - key: Halt
    description: "Halt the current operation"
    semantic_id: "cssx:HaltSkill"
    InterfaceReference: Halt
  - key: Occupy
    description: "Occupy the system for exclusive use"
    semantic_id: "cssx:OccupySkill"
    InterfaceReference: Occupy
  - key: Release
    description: "Release the system from exclusive use"
    semantic_id: "cssx:ReleaseSkill"
    InterfaceReference: Release
