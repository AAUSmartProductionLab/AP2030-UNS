omronCameraSystemAAS:
  idShort: omronCameraSystemAAS
  id: 'https://smartproductionlab.aau.dk/aas/omronCameraSystemAAS'
  globalAssetId: 'https://smartproductionlab.aau.dk/assets/M2VmNjk0OTgtNmE0YS00MzA4LWE4NjMtM2JjZDZjZDhkMTBl'
  derivedFrom: 'https://smartproductionlab.aau.dk/aas/templates/resource'
  assetType: 'https://smartproductionlab.aau.dk/Resource/CPPM/QualityControlSystem/omronCameraSystem'
  serialNumber: 'OMRON-CAM-2024-001'
  location: 'InnoLab, Nybrovej, AAU'
  AssetInterfacesDescription:
    InterfaceMQTT:
      Title: 'optima Camera System'
      EndpointMetadata:
        base: 'mqtt://192.168.0.104:1883/NN/Nybrovej/InnoLab/QualityControl'
        contentType: 'application/json'
      InteractionMetadata:
        actions:
        - key: 'Capture'
          title: 'Capture'
          synchronous: 'true'
          input: 'https://aausmartproductionlab.github.io/AP2030-UNS/MQTTSchemas/command.schema.json'
          output: 'https://aausmartproductionlab.github.io/AP2030-UNS/MQTTSchemas/commandResponse.schema.json'
          forms:
            contentType: 'application/json'
            href: '/CMD/Capture'
            op: 'invokeAction'
            mqv_retain: 'false'
            mqv_controlPacket: subscribe
            mqv_qos: '2'
            response:
              contentType: 'application/json'
              href: '/DATA/Capture'
              mqv_controlPacket: 'publish'
              mqv_retain: 'false'
        - key: 'Halt'
          title: 'Halt'
          synchronous: 'true'
          input: 'https://aausmartproductionlab.github.io/AP2030-UNS/MQTTSchemas/command.schema.json'
          forms:
            contentType: 'application/json'
            href: '/CMD/Halt'
            op: 'invokeAction'
            mqv_retain: 'false'
            mqv_controlPacket: subscribe
            mqv_qos: '2'
        - key: 'Occupy'
          title: 'Occupy'
          synchronous: 'true'
          input: 'https://aausmartproductionlab.github.io/AP2030-UNS/MQTTSchemas/command.schema.json'
          output: 'https://aausmartproductionlab.github.io/AP2030-UNS/MQTTSchemas/commandResponse.schema.json'
          forms:
            contentType: 'application/json'
            href: '/CMD/Occupy'
            op: 'invokeAction'
            mqv_retain: 'false'
            mqv_controlPacket: subscribe
            mqv_qos: '2'
            response:
              contentType: 'application/json'
              href: '/DATA/Occupy'
              mqv_controlPacket: 'publish'
              mqv_retain: 'false'
        - key: 'Release'
          title: 'Release'
          synchronous: 'true'
          input: 'https://aausmartproductionlab.github.io/AP2030-UNS/MQTTSchemas/command.schema.json'
          output: 'https://aausmartproductionlab.github.io/AP2030-UNS/MQTTSchemas/commandResponse.schema.json'
          forms:
            contentType: 'application/json'
            href: '/CMD/Release'
            op: 'invokeAction'
            mqv_retain: 'false'
            mqv_controlPacket: subscribe
            mqv_qos: '2'
            response:
              contentType: 'application/json'
              href: '/DATA/Release'
              mqv_controlPacket: 'publish'
              mqv_retain: 'false'
        properties:
        - key: 'StationState'
          title: 'StationState'
          output: 'https://aausmartproductionlab.github.io/AP2030-UNS/MQTTSchemas/stationState.schema.json'
          forms:
            contentType: 'application/json'
            href: '/DATA/State'
            mqv_retain: 'true'
            mqv_controlPacket: publish
            mqv_qos: '0'
        - key: 'Image'
          title: 'Image'
          output: 'https://aausmartproductionlab.github.io/AP2030-UNS/MQTTSchemas/image.schema.json'
          forms:
            contentType: 'application/json'
            href: '/DATA/Image'
            mqv_retain: 'false'
            mqv_controlPacket: publish
            mqv_qos: '0'

  Variables:
  - key: PackMLState
    semanticId: 'https://www.omac.org/packml/state'
    InterfaceReference:
      Name: 'StationState'
      Field: 'State'
  - key: OccupationState
    semanticId: 'https://smartproductionlab.aau.dk/stationOccupation'
    InterfaceReference:
      Name: 'StationState'
      Field: 'ProcessQueue'
  - key: Image
    semanticId: 'https://smartproductionlab.aau.dk/image'
    InterfaceReference:
      Name: 'Image'
      Field: 'Image'
  Parameters:
  HierarchicalStructures:
    Name: 'BillOfMaterials'
    Archetype: 'OneUp'
    IsPartOf:
      aauFillingLineAAS:
        globalAssetId: 'https://smartproductionlab.aau.dk/assets/MWQ2ODY5ZDEtZTQ3Yy00NWU4LTlmYTAtNTI3YjVlMDk4MWFi'
  Capabilities:
  - key: QualityControl
    realizedBy: "Capture"
    semantic_id: https://smartproductionlab.aau.dk/Capability/QualityControl
  - key: Capture
    realizedBy: "Capture"
    semantic_id: https://smartproductionlab.aau.dk/Capability/Capture

    AI-Planning:
        Domain:
            Fluents:
                -   key: "Operational"
                    semantic_id: "https://smartproductionlab.aau.dk/PDDL/Term/Predicates/Operational"
                    parameters:
                        -   name: "Resource"
                            externalRef: "https://smartproductionlab.aau.dk/Resource"
                    transformation: 'parameter1.Variables.PackMLState.State == "Execute"'

                -   key: "Occupied"
                    semantic_id: "https://smartproductionlab.aau.dk/PDDL/Term/Predicates/Occupied"
                    parameters:
                        -   name: "Resource"
                            externalRef: "https://smartproductionlab.aau.dk/Resource"
                        -   name: "Product"
                            externalRef: "https://smartproductionlab.aau.dk/Product"
                    transformation: 'parameter1.Variables.OccupationState.ProcessQueue[0] == parameter2.Parameters.Uuid'

                -   key: "Free"
                    semantic_id: "https://smartproductionlab.aau.dk/PDDL/Term/Predicates/Free"
                    parameters:
                        -   name: "Resource"
                            externalRef: "https://smartproductionlab.aau.dk/Resource"
                    transformation: 'parameter1.Variables.OccupationState.ProcessQueue == []'

            Actions:
                -   key: "Capture"
                    SkillReference: "Capture"
                    parameters:
                        -   name: "CameraSystem"
                            modelRef:
                                - AAS: "self"
                        -   name: "Product"
                            externalRef: "https://smartproductionlab.aau.dk/Product"
                        -   name: "TransportSystem"
                            externalRef: "https://smartproductionlab.aau.dk/CPS/Transport"
                          
                    conditions:
                        at_start:
                            - predicate:
                                ref: "Operational"
                                parameters: [0]
                            - predicate:
                                ref: "Occupied"
                                parameters: [0, 1]
                            - predicate:
                                external: "https://smartproductionlab.aau.dk/PDDL/Term/Predicates/At"
                                parameters: [1, 0]
                    effects:
                        at_end:
                            - predicate:
                              refs: "https://smartproductionlab.aau.dk/PDDL/Term/Predicates/Captured"
                              parameters: [1]

                -   key: "Occupy"
                    SkillReference: "Occupy"
                    parameters:
                        -   name: "CameraSystem"
                            modelRef:
                                - AAS: "self"
                        -   name: "Product"
                            externalRef: "https://smartproductionlab.aau.dk/Product"
                    conditions:
                        at_start:
                            - predicate:
                                ref: "Operational"
                                parameters: [0]
                            - not:
                                predicate:
                                    ref: "Occupied"
                                    parameters: [0, 1]
                    effects:
                        at_end:
                            - predicate:
                                ref: "Occupied"
                                parameters: [0, 1]
                            - not:
                                predicate:
                                    ref: "Free"
                                    parameters: [0]


                -   key: "Release"
                    SkillReference: "Release"
                    parameters:
                        -   name: "CameraSystem"
                            modelRef:
                                - AAS: "self"
                        -   name: "Product"
                            externalRef: "https://smartproductionlab.aau.dk/Product"
                    conditions:
                        at_start:
                            - predicate:
                                ref: "Operational"
                                parameters: [0]
                            - predicate:
                                ref: "Occupied"
                                parameters: [0, 1]
                    effects:
                        at_end:
                            - not:
                                - predicate:
                                    ref: "Occupied"
                                    parameters: [0, 1]
                            - predicate:
                                ref: "Free"
                                parameters: [0]

        Problem:
            Objects:
                -   name: "omronCameraSystem"
                    modelRef:
                        - AAS: "self"

            Init:
                -   predicate:
                    ref: "Operational"
                    parameters: [0]
                -   predicate:
                    ref: "Free"
                    parameters: [0]

            Goal:
                - predicate:
                    ref: "Operational"
                    parameters: [0]
                -   predicate:
                    ref: "Free"
                    parameters: [0]
    
  Skills:
  - key: Capture
    description: "Capture image for quality control"
    semantic_id: "https://smartproductionlab.aau.dk/skills/Capture"
    InterfaceReference: Capture
  - key: Halt
    description: "Halt the current operation"
    semantic_id: "https://smartproductionlab.aau.dk/skills/Halt"
    InterfaceReference: Halt
  - key: Occupy
    description: "Occupy the system for exclusive use"
    semantic_id: "https://smartproductionlab.aau.dk/skills/Occupy"
    InterfaceReference: Occupy
  - key: Release
    description: "Release the system from exclusive use"
    semantic_id: "https://smartproductionlab.aau.dk/skills/Release"
    InterfaceReference: Release
