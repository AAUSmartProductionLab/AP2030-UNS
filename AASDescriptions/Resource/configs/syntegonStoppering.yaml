syntegonStopperingSystemAAS:
  idShort: syntegonStopperingSystemAAS
  id: 'https://smartproductionlab.aau.dk/aas/syntegonStopperingSystemAAS'
  globalAssetId: 'https://smartproductionlab.aau.dk/assets/NGQ5ZWE4ZmUtY2Q3OS00Nzc5LWE5YjEtNGEzZGRkODRhNzQ2'
  derivedFrom: 'https://smartproductionlab.aau.dk/aas/templates/resource'
  assetType: 'https://smartproductionlab.aau.dk/Resource/CPPM/StopperingSystem/syntegonStopperingSystem'
  serialNumber: 'SYN-SS-2024-001'
  location: 'InnoLab, Nybrovej, AAU'
  AssetInterfacesDescription:
    InterfaceMQTT:
      Title: 'Syntegon Stoppering System'
      EndpointMetadata:
        base: 'mqtt://192.168.0.104:1883/NN/Nybrovej/InnoLab/Stoppering'
        contentType: 'application/json'
      InteractionMetadata:
        actions:
        - key: 'Stoppering'
          title: 'Stoppering'
          synchronous: 'false'
          input: 'https://aausmartproductionlab.github.io/AP2030-UNS/MQTTSchemas/command.schema.json'
          output: 'https://aausmartproductionlab.github.io/AP2030-UNS/MQTTSchemas/commandResponse.schema.json'
          forms:
            contentType: 'application/json'
            href: '/CMD/Stoppering'
            op: 'invokeAction'
            mqv_retain: 'false'
            mqv_controlPacket: subscribe
            mqv_qos: '2'
            response:
              contentType: 'application/json'
              href: '/DATA/Stoppering'
              mqv_controlPacket: 'publish'
              mqv_retain: 'false'
        - key: 'Halt'
          title: 'Halt'
          synchronous: 'true'
          input: 'https://aausmartproductionlab.github.io/AP2030-UNS/MQTTSchemas/command.schema.json'
          forms:
            contentType: 'application/json'
            href: '/CMD/Halt'
            op: 'invokeAction'
            mqv_retain: 'false'
            mqv_controlPacket: subscribe
            mqv_qos: '2'
        - key: 'Occupy'
          title: 'Occupy'
          synchronous: 'true'
          input: 'https://aausmartproductionlab.github.io/AP2030-UNS/MQTTSchemas/command.schema.json'
          output: 'https://aausmartproductionlab.github.io/AP2030-UNS/MQTTSchemas/commandResponse.schema.json'
          forms:
            contentType: 'application/json'
            href: '/CMD/Occupy'
            op: 'invokeAction'
            mqv_retain: 'false'
            mqv_controlPacket: subscribe
            mqv_qos: '2'
            response:
              contentType: 'application/json'
              href: '/DATA/Occupy'
              mqv_controlPacket: 'publish'
              mqv_retain: 'false'
        - key: 'Release'
          title: 'Release'
          synchronous: 'true'
          input: 'https://aausmartproductionlab.github.io/AP2030-UNS/MQTTSchemas/command.schema.json'
          output: 'https://aausmartproductionlab.github.io/AP2030-UNS/MQTTSchemas/commandResponse.schema.json'
          forms:
            contentType: 'application/json'
            href: '/CMD/Release'
            op: 'invokeAction'
            mqv_retain: 'false'
            mqv_controlPacket: subscribe
            mqv_qos: '2'
            response:
              contentType: 'application/json'
              href: '/DATA/Release'
              mqv_controlPacket: 'publish'
              mqv_retain: 'false'
        properties:
        - key: 'StationState'
          title: 'StationState'
          output: 'https://aausmartproductionlab.github.io/AP2030-UNS/MQTTSchemas/stationState.schema.json'
          forms:
            contentType: 'application/json'
            href: '/DATA/State'
            mqv_retain: 'true'
            mqv_controlPacket: publish
            mqv_qos: '0'
  Variables:
  - key: PackMLState
    semanticId: 'https://www.omac.org/packml/state'
    InterfaceReference:
      Name: 'StationState'
      Field: 'State'
  - key: OccupationState
    semanticId: 'cssx:StationOccupation'
    InterfaceReference:
      Name: 'StationState'
      Field: 'ProcessQueue'
  Parameters:
    Location:
      semanticId: 'cssx:LocationParameter'
      Position:
        X: 480.0
        Y: 0.0
        Yaw: 0.0
  HierarchicalStructures:
    Name: 'BillOfMaterials'
    Archetype: 'OneUp'
    IsPartOf:
      aauFillingLineAAS:
        globalAssetId: 'https://smartproductionlab.aau.dk/assets/MWQ2ODY5ZDEtZTQ3Yy00NWU4LTlmYTAtNTI3YjVlMDk4MWFi'
  Capabilities:
  - key: Stoppering
    realizedBy: "Stopper"
    semantic_id: cssx:StopperingCapability

  AI-Planning:
    Domain:
        Fluents:
            -   key: "Operational"
                semantic_id: "cssx:Operational"
                parameters:
                    -   name: "Resource"
                        externalRef: "css:Resource"
                transformation: 'params[0].Variables.PackMLState.State = "Execute"'

            -   key: "Occupied"
                semantic_id: "cssx:Occupied"
                parameters:
                    -   name: "Resource"
                        externalRef: "css:Resource"
                    -   name: "Product"
                        externalRef: "css:Product"
                transformation: 'params[0].Variables.OccupationState.ProcessQueue[0] = params[1].Parameters.Uuid'

            -   key: "Free"
                semantic_id: "cssx:Free"
                parameters:
                    -   name: "Resource"
                        externalRef: "css:Resource"
                transformation: '$count(params[0].Variables.OccupationState.ProcessQueue) = 0'

            -   key: "StationAt"
                semantic_id: "cssx:StationAt"
                parameters:
                    -   name: "Resource"
                        externalRef: "css:Resource"
                    -   name: "Location"
                        externalRef: "cssx:LocationParameter"

        Actions:
            -   key: "Stoppering"
                semantic_id: "cssx:StopperingCapability"
                SkillReference: "Stoppering"
                parameters:
                    -   name: "StopperingSystem"
                        modelRef:
                            - AAS: "self"
                    -   name: "Product"
                        externalRef: "css:Product"
                    -   name: "TransportSystem"
                        externalRef: "cssx:Transport"
                    -   name: "StopperingLocation"
                        modelRef:
                            - AAS: "self"
                              Submodel: "Parameters"
                              Element: "Location"
                        
                conditions:
                    at_start:
                        - predicate:
                            ref: "Operational"
                            parameters: [0]
                        - predicate:
                            ref: "Occupied"
                            parameters: [0, 1]
                        - predicate:
                            external: "cssx:On"
                            parameters: [1, 2]
                        - predicate:
                            external: "cssx:ProductAt"
                            parameters: [1, 3]
                effects:
                    at_end:
                        - predicate:
                            external: "cssx:Stoppered"
                            parameters: [1]
                            
            -   key: "Occupy"
                semantic_id: "cssx:OccupyCapability"
                SkillReference: "Occupy"
                parameters:
                    -   name: "StopperingSystem"
                        modelRef:
                            - AAS: "self"
                    -   name: "Product"
                        externalRef: "css:Product"
                conditions:
                    at_start:
                        - predicate:
                            ref: "Operational"
                            parameters: [0]
                        - not:
                            predicate:
                                ref: "Occupied"
                                parameters: [0, 1]
                effects:
                    at_end:
                        - predicate:
                            ref: "Occupied"
                            parameters: [0, 1]
                        - not:
                            predicate:
                                ref: "Free"
                                parameters: [0]


            -   key: "Release"
                semantic_id: "cssx:ReleaseCapability"
                SkillReference: "Release"
                parameters:
                    -   name: "StopperingSystem"
                        modelRef:
                            - AAS: "self"
                    -   name: "Product"
                        externalRef: "css:Product"
                conditions:
                    at_start:
                        - predicate:
                            ref: "Operational"
                            parameters: [0]
                        - predicate:
                            ref: "Occupied"
                            parameters: [0, 1]
                effects:
                    at_end:
                        - not:
                            - predicate:
                                ref: "Occupied"
                                parameters: [0, 1]
                        - predicate:
                            ref: "Free"
                            parameters: [0]

    Problem:
        Objects:
            -   name: "syntegonStopperingSystem"
                modelRef:
                    - AAS: "self"
            -   name: "stopperingLocation"
                modelRef:
                    - AAS: "self"
                      Submodel: "Parameters"
                      Element: "Location"

        Init:
            -   predicate:
                ref: "Operational"
                parameters: [0]
            -   predicate:
                ref: "Free"
                parameters: [0]
            -   predicate:
                ref: "StationAt"
                parameters: [0, 1]

        Goal:
            - predicate:
                ref: "Operational"
                parameters: [0]
            -   predicate:
                ref: "Free"
                parameters: [0]

  Skills:
  - key: Stoppering
    description: "Stoppering function for pharmaceutical primary packaging"
    semantic_id: "cssx:StopperingSkill"
    InterfaceReference: Stoppering
  - key: Halt
    description: "Halt the current stoppeng operation"
    semantic_id: "cssx:HaltSkill"
    InterfaceReference: Halt
  - key: Occupy
    description: "Occupy the system for exclusive use"
    semantic_id: "cssx:OccupySkill"
    InterfaceReference: Occupy
  - key: Release
    description: "Release the system from exclusive use"
    semantic_id: "cssx:ReleaseSkill"
    InterfaceReference: Release
