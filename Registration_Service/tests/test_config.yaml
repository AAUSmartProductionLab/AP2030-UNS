imaLoadingSystem2AAS:
    idShort: imaLoadingSystem2AAS
    id: 'https://smartproductionlab.aau.dk/aas/imaLoadingSystem2AAS'
    globalAssetId: 'https://smartproductionlab.aau.dk/assets/ZDNlYmVhZjItZTAyMC00NWMwLTg5NjEtODRiNTFkOWE0NzVl2'
    derivedFrom: 'https://smartproductionlab.aau.dk/aas/templates/resource'
    assetType: 'https://smartproductionlab.aau.dk/Resource/CPPM/LoadingSystem/imaLoadingSystem'
    serialNumber: 'IMA-LS-2024-001'
    location: 'InnoLab, Nybrovej, AAU'
    AssetInterfacesDescription:
        InterfaceMQTT:
            Title: 'IMA Loading System'
            EndpointMetadata:
                base: 'mqtt://192.168.0.104:1883/NN/Nybrovej/InnoLab/Loading'
                contentType: 'application/json'
            InteractionMetadata:
                actions:
                    -   key: 'Loading'
                        title: 'Loading'
                        synchronous: 'false'
                        input: 'https://aausmartproductionlab.github.io/AP2030-UNS/MQTTSchemas/command.schema.json'
                        output: 'https://aausmartproductionlab.github.io/AP2030-UNS/MQTTSchemas/commandResponse.schema.json'
                        forms:
                            contentType: 'application/json'
                            href: '/CMD/Loading'
                            op: 'invokeAction'
                            mqv_retain: 'false'
                            mqv_controlPacket: subscribe
                            mqv_qos: '2'
                            response:
                                contentType: 'application/json'
                                href: '/DATA/Loading'
                                mqv_controlPacket: 'publish'
                                mqv_retain: 'false'
                    -   key: 'Halt'
                        title: 'Halt'
                        synchronous: 'true'
                        input: 'https://aausmartproductionlab.github.io/AP2030-UNS/MQTTSchemas/command.schema.json'
                        forms:
                            contentType: 'application/json'
                            href: '/CMD/Halt'
                            op: 'invokeAction'
                            mqv_retain: 'false'
                            mqv_controlPacket: subscribe
                            mqv_qos: '2'
                    -   key: 'Occupy'
                        title: 'Occupy'
                        synchronous: 'true'
                        input: 'https://aausmartproductionlab.github.io/AP2030-UNS/MQTTSchemas/command.schema.json'
                        output: 'https://aausmartproductionlab.github.io/AP2030-UNS/MQTTSchemas/commandResponse.schema.json'
                        forms:
                            contentType: 'application/json'
                            href: '/CMD/Occupy'
                            op: 'invokeAction'
                            mqv_retain: 'false'
                            mqv_controlPacket: subscribe
                            mqv_qos: '2'
                            response:
                                contentType: 'application/json'
                                href: '/DATA/Occupy'
                                mqv_controlPacket: 'publish'
                                mqv_retain: 'false'
                    -   key: 'Release'
                        title: 'Release'
                        synchronous: 'true'
                        input: 'https://aausmartproductionlab.github.io/AP2030-UNS/MQTTSchemas/command.schema.json'
                        output: 'https://aausmartproductionlab.github.io/AP2030-UNS/MQTTSchemas/commandResponse.schema.json'
                        forms:
                            contentType: 'application/json'
                            href: '/CMD/Release'
                            op: 'invokeAction'
                            mqv_retain: 'false'
                            mqv_controlPacket: subscribe
                            mqv_qos: '2'
                            response:
                                contentType: 'application/json'
                                href: '/DATA/Release'
                                mqv_controlPacket: 'publish'
                                mqv_retain: 'false'
                properties:
                    -   key: 'StationState'
                        title: 'StationState'
                        output: 'https://aausmartproductionlab.github.io/AP2030-UNS/MQTTSchemas/stationState.schema.json'
                        forms:
                            contentType: 'application/json'
                            href: '/DATA/State'
                            mqv_retain: 'true'
                            mqv_controlPacket: publish
                            mqv_qos: '0'

    Variables:
        -   key: "PackMLState"
            semanticId: 'https://www.omac.org/packml/state'
            InterfaceReference:
                Name: 'StationState'
                Field: 'State'
        -   key: "OccupationState"
            semanticId: 'https://smartproductionlab.aau.dk/stationOccupation'
            InterfaceReference:
                Name: 'StationState'
                Field: 'ProcessQueue'

    Parameters:

    HierarchicalStructures:
        Name: 'BillOfMaterials'
        Archetype: 'OneUp'
        IsPartOf:
            aauFillingLineAAS:
                globalAssetId: 'https://smartproductionlab.aau.dk/assets/MWQ2ODY5ZDEtZTQ3Yy00NWU4LTlmYTAtNTI3YjVlMDk4MWFi'

    Capabilities:
        -   key: "Loading"
            realizedBy: "Load"
            semantic_id: https://smartproductionlab.aau.dk/Capability/Loading

    AI-Planning:
        Domain:
            Fluents:
                -   key: "Operational"
                    semantic_id: "https://smartproductionlab.aau.dk/PDDL/Term/Predicates/Operational"
                    parameters:
                        -   name: "Resource"
                            externalRef: "https://smartproductionlab.aau.dk/Resource"
                    transformation: 'parameter1.Variables.PackMLState.State == "Execute"'

                -   key: "Occupied"
                    semantic_id: "https://smartproductionlab.aau.dk/PDDL/Term/Predicates/Occupied"
                    parameters:
                        -   name: "Resource"
                            externalRef: "https://smartproductionlab.aau.dk/Resource"
                        -   name: "Product"
                            externalRef: "https://smartproductionlab.aau.dk/Product"
                    transformation: 'parameter1.Variables.OccupationState.ProcessQueue[0] == parameter2.Parameters.Uuid'

            Actions:
                -   key: "Loading"
                    SkillReference: "Loading"
                    parameters:
                        -   name: "LoadingSystem"
                            modelRef:
                                - AAS: "self"
                        -   name: "Product"
                            externalRef: "https://smartproductionlab.aau.dk/Product"
                        -   name: "TransportSystem"
                            externalRef: "https://smartproductionlab.aau.dk/CPS/Transport"
                    duration:
                        =:
                            right:
                                const: 5.0
                    conditions:
                        at_start:
                            - predicate:
                                ref: "Operational"
                                parameters: [0]
                            - predicate:
                                ref: "Occupied"
                                parameters: [0, 1]
                    effects:
                        at_end:
                            - predicate:
                                external: "https://smartproductionlab.aau.dk/PDDL/Term/Predicates/On"
                                parameters: [1, 2]
                            - predicate:
                                external: "https://smartproductionlab.aau.dk/PDDL/Term/Predicates/At"
                                parameters: [1, 0]

                -   key: "Occupy"
                    SkillReference: "Occupy"
                    parameters:
                        -   name: "LoadingSystem"
                            modelRef:
                                - AAS: "self"
                        -   name: "Product"
                            externalRef: "https://smartproductionlab.aau.dk/Product"
                    conditions:
                        at_start:
                            - predicate:
                                ref: "Operational"
                                parameters: [0]
                            - not:
                                predicate:
                                    ref: "Occupied"
                                    parameters: [0, 1]
                    effects:
                        at_end:
                            - predicate:
                                ref: "Occupied"
                                parameters: [0, 1]

                -   key: "Release"
                    SkillReference: "Release"
                    parameters:
                        -   name: "LoadingSystem"
                            modelRef:
                                - AAS: "self"
                        -   name: "Product"
                            externalRef: "https://smartproductionlab.aau.dk/Product"
                    conditions:
                        at_start:
                            - predicate:
                                ref: "Operational"
                                parameters: [0]
                            - predicate:
                                ref: "Occupied"
                                parameters: [0, 1]
                    effects:
                        at_end:
                            - predicate:
                                ref: "Occupied"
                                parameters: [0, 1]

            Processes:
                -   key: "MaintainOccupation"
                    parameters:
                        -   name: "LoadingSystem"
                            modelRef:
                                - AAS: "self"
                        -   name: "Product"
                            modelRef:
                                - AAS: "https://smartproductionlab.aau.dk/aas/MIM8AAS"
                    precondition:
                        - predicate:
                            ref: "Operational"
                            parameters: [0]
                        - predicate:
                            ref: "Occupied"
                            parameters: [0, 1]
                    effect:
                        - predicate:
                            ref: "Occupied"
                            parameters: [0, 1]

            Events:
                -   key: "AutoReleaseOnStop"
                    parameters:
                        -   name: "LoadingSystem"
                            modelRef:
                                - AAS: "self"
                        -   name: "Product"
                            modelRef:
                                - AAS: "https://smartproductionlab.aau.dk/aas/MIM8AAS"
                    precondition:
                        - not:
                            predicate:
                                ref: "Operational"
                                parameters: [0]
                        - predicate:
                            ref: "Occupied"
                            parameters: [0, 1]
                    effect:
                        - not:
                            predicate:
                                ref: "Occupied"
                                parameters: [0, 1]

            Constraints:
                -   always:
                        - predicate:
                            ref: "Operational"
                            parameters: [0]

                -   at-most-once:
                        - predicate:
                            ref: "Occupied"
                            parameters: [0, 1]

        Problem:
            Objects:
                -   name: "imaLoadingSystem2"
                    modelRef:
                        - AAS: "self"
                -   name: "MIM8"
                    modelRef:
                        - AAS: "https://smartproductionlab.aau.dk/aas/MIM8AAS"

            Init:
                -   predicate:
                    ref: "Operational"
                    parameters: [0]
                - not:
                    -   predicate:
                        ref: "Occupied"
                        parameters: [0, 1]

            Goal:
                - predicate:
                    ref: "Operational"
                    parameters: [0]
                - not:
                    - predicate:
                        ref: "Occupied"
                        parameters: [0, 1]
                - preference:
                    name: "goal_operational"
                    term:
                        predicate:
                            ref: "Operational"
                            parameters: [0]

            Constraints:
                -   always:
                        - predicate:
                            ref: "Operational"
                            parameters: [0]

                -   sometime:
                        - predicate:
                            ref: "Occupied"
                            parameters: [0, 1]

                - preference:
                    name: "avoid_multiple_occupation"
                    term:
                        at-most-once:
                            - predicate:
                                ref: "Occupied"
                                parameters: [0, 1]

            Metric:
                optimize: "minimize"
                expression:
                    - "+":
                        - "*":
                            - function:
                                preference: "goal_operational"
                            - const:
                                name: "Weight"
                                value: 10
                        - "*":
                            - function:
                                preference: "avoid_multiple_occupation"
                            - const:
                                name: "Weight"
                                value: 5

    Skills:
        -   key: "Loading"
            description: "Loading function for pharmaceutical primary packaging"
            semantic_id: "https://smartproductionlab.aau.dk/skills/Loading"
            InterfaceReference: "Loading"

        -   key: "Halt"
            description: "Halt the current operation"
            semantic_id: "https://smartproductionlab.aau.dk/skills/Halt"
            InterfaceReference: "Halt"

        -   key: "Occupy"
            description: "Occupy the system for exclusive use"
            semantic_id: "https://smartproductionlab.aau.dk/skills/Occupy"
            InterfaceReference: "Occupy"

        -   key: "Release"
            description: "Release the system from exclusive use"
            semantic_id: "https://smartproductionlab.aau.dk/skills/Release"
            InterfaceReference: "Release"
